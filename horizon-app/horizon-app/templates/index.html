<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Horizon — App Health & Command Center</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap');

    :root {
      --bg:        #0d0f14;
      --surface:   #151820;
      --border:    #232738;
      --accent:    #4f8ef7;
      --accent2:   #38d9a9;
      --danger:    #f76f6f;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --up:        #38d9a9;
      --down:      #f76f6f;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .logo {
      font-family: var(--mono);
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .clock {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      gap: 0;
      padding: 0 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .tab-btn {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 14px 28px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Panels ── */
    .panel { display: none; padding: 32px; }
    .panel.active { display: block; }

    /* ── Health Tab ── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .refresh-btn {
      font-family: var(--mono);
      font-size: 0.75rem;
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-btn:hover { background: rgba(79,142,247,0.1); }
    .refresh-btn.spinning .icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .app-card:hover { border-color: var(--accent); }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-name {
      font-family: var(--mono);
      font-size: 0.95rem;
      font-weight: 600;
    }
    .badge {
      font-family: var(--mono);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge.UP   { background: rgba(56,217,169,0.15); color: var(--up);   border: 1px solid rgba(56,217,169,0.3); }
    .badge.DOWN { background: rgba(247,111,111,0.15); color: var(--down); border: 1px solid rgba(247,111,111,0.3); }
    .badge.CHECKING { background: rgba(100,116,139,0.2); color: var(--muted); border: 1px solid var(--border); }
    .app-url {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      word-break: break-all;
    }
    .app-code {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    .status-bar {
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }
    .status-bar-fill {
      height: 100%;
      width: 0;
      border-radius: 2px;
      transition: width 0.6s ease;
    }
    .status-bar-fill.UP   { background: var(--up);   width: 100%; }
    .status-bar-fill.DOWN { background: var(--down);  width: 100%; }

    .summary-row {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .summary-chip {
      font-family: var(--mono);
      font-size: 0.78rem;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .summary-chip strong { color: var(--text); }
    .summary-chip.up strong   { color: var(--up); }
    .summary-chip.down strong { color: var(--down); }

    /* ── Chat Tab ── */
    .chat-wrap {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 160px);
    }
    .chat-history {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 16px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .chat-bubble {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }
    .chat-bubble.user { align-self: flex-end; align-items: flex-end; }
    .chat-bubble.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .bubble-text {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.88rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .chat-bubble.user .bubble-text {
      background: rgba(79,142,247,0.15);
      border: 1px solid rgba(79,142,247,0.25);
      color: var(--text);
    }
    .chat-bubble.bot .bubble-text {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.82rem;
    }
    .chat-bubble.bot .bubble-text code {
      background: #0d0f14;
      padding: 8px 10px;
      display: block;
      border-radius: 4px;
      margin-top: 6px;
      font-size: 0.78rem;
      color: var(--accent2);
      border: 1px solid var(--border);
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .chat-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-input::placeholder { color: var(--muted); }
    .chat-input:focus { border-color: var(--accent); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 12px 22px;
      font-family: var(--mono);
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .send-btn:hover   { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .hint-chip {
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .hint-chip:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Typing indicator ── */
    .typing-dots { display: flex; gap: 5px; padding: 4px 0; }
    .typing-dots span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    /* scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">HORIZON <span>/ Command Center</span></div>
  <div class="clock" id="clock">--:--:--</div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('health', this)">⬡ APP HEALTH</button>
  <button class="tab-btn" onclick="switchTab('chat', this)">⌘ CHATBOT</button>
</div>

<!-- ── HEALTH PANEL ── -->
<div class="panel active" id="panel-health">
  <div class="panel-header">
    <span class="panel-title">Application Status</span>
    <button class="refresh-btn" id="refreshBtn" onclick="loadHealth()">
      <span class="icon">↻</span> Refresh
    </button>
  </div>
  <div class="summary-row" id="summaryRow">
    <div class="summary-chip">Checking apps…</div>
  </div>
  <div class="app-grid" id="appGrid">
    <!-- cards injected by JS -->
  </div>
</div>

<!-- ── CHAT PANEL ── -->
<div class="panel" id="panel-chat">
  <div class="chat-wrap">
    <div class="hint-chips">
      <span class="hint-chip" onclick="fillHint(this)">start jenkins</span>
      <span class="hint-chip" onclick="fillHint(this)">status tomcat</span>
      <span class="hint-chip" onclick="fillHint(this)">stop jenkins</span>
      <span class="hint-chip" onclick="fillHint(this)">is tomcat running?</span>
    </div>
    <div class="chat-history" id="chatHistory">
      <div class="chat-bubble bot">
        <div class="bubble-label">HORIZON BOT</div>
        <div class="bubble-text">Hey! I'm Horizon Bot. Tell me what you need — for example:
• "start jenkins"
• "status tomcat"
• "jenkins is down, please bring it up"</div>
      </div>
    </div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" placeholder="Type a command… e.g. start jenkins" onkeydown="if(event.key==='Enter') sendChat()" />
      <button class="send-btn" id="sendBtn" onclick="sendChat()">Send</button>
    </div>
  </div>
</div>

<script>
// ── Clock ─────────────────────────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-IN', {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

// ── Tabs ──────────────────────────────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}

// ── Health ────────────────────────────────────────────────────────────────────
async function loadHealth() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');

  const grid    = document.getElementById('appGrid');
  const summary = document.getElementById('summaryRow');

  // Show skeleton cards
  grid.innerHTML = `<div class="app-card"><div class="card-top"><span class="app-name">Checking…</span><span class="badge CHECKING">…</span></div></div>`.repeat(3);

  try {
    const res  = await fetch('/api/health');
    const apps = await res.json();

    const upCount   = apps.filter(a => a.status === 'UP').length;
    const downCount = apps.filter(a => a.status === 'DOWN').length;

    summary.innerHTML = `
      <div class="summary-chip">Total <strong>${apps.length}</strong></div>
      <div class="summary-chip up">Up <strong>${upCount}</strong></div>
      <div class="summary-chip down">Down <strong>${downCount}</strong></div>
    `;

    grid.innerHTML = apps.map(a => `
      <div class="app-card">
        <div class="card-top">
          <span class="app-name">${a.name}</span>
          <span class="badge ${a.status}">${a.status}</span>
        </div>
        <div class="app-url">${a.url}</div>
        <div class="app-code">HTTP ${a.code}</div>
        <div class="status-bar"><div class="status-bar-fill ${a.status}"></div></div>
      </div>
    `).join('');
  } catch(e) {
    grid.innerHTML = `<div class="app-card"><div class="app-name" style="color:var(--danger)">Failed to reach backend.</div></div>`;
  }

  btn.classList.remove('spinning');
}

// Auto-load on page ready
loadHealth();
// Auto-refresh every 60s
setInterval(loadHealth, 60000);

// ── Chat ──────────────────────────────────────────────────────────────────────
function fillHint(el) {
  document.getElementById('chatInput').value = el.textContent.trim();
  document.getElementById('chatInput').focus();
}

function appendBubble(role, text) {
  const history = document.getElementById('chatHistory');
  const div = document.createElement('div');
  div.className = `chat-bubble ${role}`;

  // Render **bold** markers as <strong>
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/```([\s\S]*?)```/g, '<code>$1</code>');

  div.innerHTML = `
    <div class="bubble-label">${role === 'user' ? 'YOU' : 'HORIZON BOT'}</div>
    <div class="bubble-text">${formatted}</div>
  `;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
  return div;
}

function showTyping() {
  const history = document.getElementById('chatHistory');
  const div = document.createElement('div');
  div.className = 'chat-bubble bot';
  div.id = 'typingBubble';
  div.innerHTML = `
    <div class="bubble-label">HORIZON BOT</div>
    <div class="bubble-text"><div class="typing-dots"><span></span><span></span><span></span></div></div>
  `;
  history.appendChild(div);
  history.scrollTop = history.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingBubble');
  if (el) el.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const btn   = document.getElementById('sendBtn');
  const msg   = input.value.trim();
  if (!msg) return;

  input.value = '';
  btn.disabled = true;

  appendBubble('user', msg);
  showTyping();

  try {
    const res  = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    removeTyping();
    appendBubble('bot', data.reply);
  } catch(e) {
    removeTyping();
    appendBubble('bot', '❌ Could not reach backend. Check if Flask is running.');
  }

  btn.disabled = false;
  input.focus();
}
</script>
</body>
</html>
